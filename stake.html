<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tompolo Legacy | Mainnet Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        html, body { background-color: #050505 !important; margin: 0; padding: 0; color: white; font-family: 'Inter', sans-serif; }
        .stake-shell { background: rgba(10, 10, 11, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(179, 139, 77, 0.25); border-radius: 20px; padding: 40px; width: 90% !important; max-width: 1200px; margin: 10px auto !important; box-sizing: border-box; text-align: center; }
        .status-msg { margin: 20px 0; font-weight: bold; color: #ffcc00; font-size: 14px; text-transform: uppercase; }
        .btn-legacy-stake { background: #ffffff !important; color: #000 !important; width: 100%; margin-top: 20px; padding: 16px; border-radius: 8px; font-family: 'Bebas Neue'; font-size: 22px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <section class="stake-shell">
        <h2 style="font-family: 'Bebas Neue'; font-size: 48px;">MAINNET TEST</h2>
        <div id="status" class="status-msg">READY TO CONNECT</div>
        <button id="action-btn" class="btn-legacy-stake">CONNECT WALLET</button>
    </section>

    <script>
        const status = document.getElementById('status');
        const btn = document.getElementById('action-btn');
        let wallet = null;

        // FIXED: Using Ankr to bypass the 403 Forbidden error
        const connection = new solanaWeb3.Connection("https://rpc.ankr.com/solana", "confirmed");

        async function startTest() {
            status.innerText = "GETTING BLOCKHASH...";
            try {
                const { blockhash } = await connection.getLatestBlockhash();
                const tx = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: wallet,
                        toPubkey: wallet,
                        lamports: 0.001 * solanaWeb3.LAMPORTS_PER_SOL,
                    })
                );
                tx.recentBlockhash = blockhash;
                tx.feePayer = wallet;

                status.innerText = "AWAITING PHANTOM...";
                const { signature } = await window.solana.signAndSendTransaction(tx);
                status.innerText = "SUCCESS! SIGNATURE: " + signature.substring(0,8);
            } catch (err) {
                status.innerText = "ERROR: " + err.message;
            }
        }

        btn.addEventListener('click', async () => {
            if (!wallet) {
                const resp = await window.solana.connect();
                wallet = resp.publicKey;
                status.innerText = "CONNECTED";
                btn.innerText = "START SELF-TRANSFER TEST";
            } else {
                startTest();
            }
        });
    </script>
</body>
</html>
