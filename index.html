<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tompolo Legacy — The Gold Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="logo">TOMPOLO LEGACY</div>
        <nav class="desktop-nav">
            <a href="#about">About</a>
            <a href="#roadmap">Roadmap</a>
            <a href="#contact">Community</a>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">
            <div class="line"></div><div class="line"></div><div class="line"></div>
        </div>
    </header>

    <div id="side-menu" class="side-menu">
        <a href="#about" onclick="toggleMenu()">About</a>
        <a href="#roadmap" onclick="toggleMenu()">Roadmap</a>
        <button class="wallet-btn" onclick="window.location.href='#contact'">JOIN COMMUNITY</button>
    </div>

    <section class="hero">
        <div class="hero-text">
            <h1 class="metallic-shine">TOMPOLO LEGACY</h1>
            <p>The Gold Standard of Meme Utility</p>
            <div class="hero-buttons">
                <button class="btn-gold">Buy Token</button>
                <button class="btn-outline">Whitepaper</button>
            </div>
        </div>
        <div class="hero-image">
            <img src="Tomp1.png" alt="Tompolo Coin">
        </div>
    </section>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("side-menu");
            if (menu.style.width === "90%") {
                menu.style.width = "0";
                menu.style.opacity = "0";
            } else {
                menu.style.width = "90%";
                menu.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
