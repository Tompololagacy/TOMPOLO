<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tompolo Legacy | Grant Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

    <style>
        html, body { background-color: #050505 !important; margin: 0; padding: 0; color: white; font-family: 'Inter', sans-serif; }
        .gate-shell {
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(179, 139, 77, 0.25);
            border-radius: 20px;
            padding: 40px;
            width: 90% !important;
            max-width: 1200px;
            margin: 10px auto !important;
            box-sizing: border-box;
            text-align: center;
        }
        .status-msg { margin: 20px 0; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; color: #ffcc00; font-size: 14px; }
        .btn-legacy-connect {
            background: #ffffff !important;
            color: #000 !important;
            width: 240px; 
            margin: 0 auto !important;
            text-align: center;
            display: block;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Bebas Neue';
            font-size: 18px;
            border: none;
            cursor: pointer;
        }
        #grant-form-wrapper { display: none; margin-top: 30px; padding-top: 30px; border-top: 1px solid rgba(179, 139, 77, 0.2); }
        .grant-input { width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(179, 139, 77, 0.3); color: white; padding: 15px; margin: 10px auto; display: block; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="gate-shell">
        <p style="color: rgba(179, 139, 77, 0.6); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold;">Security Protocol</p>
        <h2 style="font-family: 'Bebas Neue'; font-size: 40px; color: #fff; margin: 0 0 20px 0;">BIZ SUPPORT GATE</h2>
        <div id="wallet-status" class="status-msg">READY TO CONNECT</div>
        <button id="connect-btn" class="btn-legacy-connect">CONNECT WALLET</button>

        <div id="grant-form-wrapper">
            <h3 style="font-family: 'Bebas Neue'; color: #00ff00; font-size: 24px; margin-bottom: 20px;">✓ ELIGIBILITY VERIFIED</h3>
            <form action="YOUR_GOOGLE_FORM_URL" method="POST">
                <input type="text" class="grant-input" placeholder="Business Name" required>
                <input type="text" class="grant-input" id="display-wallet" placeholder="Wallet Address" readonly>
                <textarea class="grant-input" placeholder="Describe your business mission..." rows="4" required></textarea>
                <button type="submit" class="btn-legacy-connect" style="background: #b38b4d !important; color: #fff !important; width: 100%; max-width: 500px;">SUBMIT GRANT APPLICATION</button>
            </form>
        </div>
    </div>

    <script>
        const USDC_MINT = "EPjFW36wd2WtNcqdwAa6zhdnxNDwj36H2E7iPEloZja1";
        const MIN_REQUIRED = 0.50;

        const connectBtn = document.getElementById('connect-btn');
        const statusMsg = document.getElementById('wallet-status');
        const formWrapper = document.getElementById('grant-form-wrapper');
        const walletInput = document.getElementById('display-wallet');

        async function checkUSDC(address) {
            statusMsg.innerText = "VERIFYING 0.5 USDC...";
            try {
                // Using the absolute most standard connection possible
                const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
                const accounts = await connection.getParsedTokenAccountsByOwner(
                    new solanaWeb3.PublicKey(address),
                    { mint: new solanaWeb3.PublicKey(USDC_MINT) }
                );

                let balance = 0;
                if (accounts.value.length > 0) {
                    balance = accounts.value[0].account.data.parsed.info.tokenAmount.uiAmount || 0;
                }

                if (balance >= MIN_REQUIRED) {
                    statusMsg.style.color = "#00ff00";
                    statusMsg.innerText = "ELIGIBLE: " + balance.toFixed(2) + " USDC";
                    walletInput.value = address;
                    formWrapper.style.display = "block";
                    connectBtn.style.display = "none";
                } else {
                    statusMsg.style.color = "#ff4444";
                    statusMsg.innerText = "NOT ELIGIBLE: " + balance.toFixed(2) + " USDC FOUND. (0.5 REQUIRED)";
                }
            } catch (err) {
                statusMsg.innerText = "SCANNING BLOCKCHAIN...";
                setTimeout(() => checkUSDC(address), 1000);
            }
        }

        connectBtn.addEventListener('click', async () => {
            // THE DIRECT FIRST-VERSION METHOD
            if (window.solana) {
                try {
                    const resp = await window.solana.connect();
                    checkUSDC(resp.publicKey.toString());
                } catch (err) {
                    statusMsg.innerText = "CONNECTION REJECTED";
                }
            } else {
                statusMsg.innerText = "PHANTOM NOT FOUND";
                window.open("https://phantom.app/", "_blank");
            }
        });
    </script>
</body>
</html>
